<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffd6f6, #e0c3fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
    }

    h1 {
      color: #d63384;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: #ff69b4;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff1493;
    }

    .compliment {
      margin-top: 20px;
      font-size: 18px;
      color: #6a0dad;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>Hey Bunny 🐰🌸</h1>
    <p>You are stronger, brighter, and more beautiful than you realize 💖</p>
    <button onclick="showCompliment()">Click for a surprise 💌</button>
    <div class="compliment" id="compliment"></div>
  </div>

  <script>
    const compliments = [
      "Your smile can fix bad days 😊",
      "You deserve the happiest life 🌸",
      "You are incredibly strong 💪",
      "The world is lucky to have you 💖",
      "You make everything better ✨",
      "You are deeply appreciated 💕",
      "You inspire more than you know 🌷",
      "You are beautiful inside and out 💫",
      "You matter. Always. 💗",
      "You are someone's favorite person 💌"
    ];

    function showCompliment() {
      const random = compliments[Math.floor(Math.random() * compliments.length)];
      document.getElementById("compliment").innerText = random;
    }
  </script>

</body>
</html>
